app = "deve-pamiri"
primary_region = "ams"

[build]

[env]
  NODE_ENV = "production"
  DATABASE_PATH = "/data/deve.db"
  PORT = "5000"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "deve_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
